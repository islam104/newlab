spring.application.name=newsem

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/newsem_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=${PORT:8080}

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT Configuration
# 32-byte Base64 keys (can be overridden with env JWT_ACCESS_SECRET / JWT_REFRESH_SECRET)
security.jwt.access-secret=${JWT_ACCESS_SECRET:${SECURITY_JWT_SECRET:wrz9XyUgLd+fcAEU+E4yjjdg9ec+icxPJ4B/IUnoViI=}}
security.jwt.refresh-secret=${JWT_REFRESH_SECRET:${SECURITY_JWT_SECRET:U+/ajsL24zZRHCaUUv8ZZ1S21VHXzKjIff8uXG5w1Os=}}
security.jwt.access-expiration-minutes=${JWT_ACCESS_TTL_MINUTES:15}
security.jwt.refresh-expiration-days=${JWT_REFRESH_TTL_DAYS:7}

# Ticket signature
security.ticket.secret=${TICKET_SIGNING_SECRET:1W8o2091bkBfFBkCmLSz62pw5uvwArLYqRC/bdmIA0Y=}
security.ticket.ttl-seconds=${TICKET_TTL_SECONDS:300}
